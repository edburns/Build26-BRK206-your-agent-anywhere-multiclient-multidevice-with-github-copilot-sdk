{% extends "base.html" %}

{% block title %}Real Estate Agent Pipeline{% endblock %}

{% block body %}
<main x-data="pipelinePage({{ initial_state | tojson }})" x-init="init()">
    <header class="page-header">
        <h1>Real Estate Agent Pipeline</h1>
        <p class="subtitle">GitHub Copilot SDK for Python -- BRK206 Demo</p>
    </header>

    <section class="pipeline-shell" @click="handlePipelineClick($event)" @keydown.enter="handlePipelineKeydown($event)">
        <button
            type="button"
            class="add-btn"
            title="Add query"
            aria-label="Add query"
            @click.stop="submitQuery()"
        >+</button>

        <div
            id="pipeline-content"
            class="main-layout"
            hx-get="/partials/pipeline"
            hx-trigger="pipeline-reconcile from:body"
            hx-swap="innerHTML"
        >
            {% include "partials/pipeline.html" %}
        </div>
    </section>

    <!-- Detail panel overlay -->
    <div
        class="detail-overlay"
        x-show="selectedQueryId !== null"
        x-transition:enter="detail-overlay-enter"
        x-transition:enter-start="detail-overlay-enter-start"
        x-transition:enter-end="detail-overlay-enter-end"
        @click.self="closeDetail()"
        aria-modal="true"
        role="dialog"
        aria-label="Agent detail"
        style="display:none"
    >
        <aside class="detail-panel">
            <div class="detail-panel-header">
                <span class="detail-panel-title">Agent Detail</span>
                <button
                    type="button"
                    class="detail-close-btn"
                    aria-label="Close detail panel"
                    @click="closeDetail()"
                >✕</button>
            </div>
            <div class="detail-panel-body">
                <!-- Header -->
                <template x-if="detailAgent">
                    <div>
                        <div class="detail-header">
                            <div class="detail-id" x-text="detailAgent.queryId"></div>
                            <div class="detail-query" x-text="detailAgent.queryText"></div>
                            <div class="detail-meta">
                                <span class="detail-phase" x-text="detailAgent.phase"></span>
                                <span class="detail-intent" x-show="detailAgent.intent" x-text="detailAgent.intent"></span>
                            </div>
                        </div>

                        <!-- Event timeline -->
                        <div class="detail-timeline">
                            <div class="timeline-heading">Event Timeline</div>
                            <template x-if="detailEvents.length === 0">
                                <div class="timeline-empty">No events yet.</div>
                            </template>
                            <template x-for="(event, idx) in detailEvents" :key="idx">
                                <div :class="'timeline-entry timeline-' + event.type">
                                    <span class="timeline-time" x-text="event.timestamp"></span>
                                    <template x-if="event.type === 'phase_change'">
                                        <span>
                                            <span class="timeline-badge badge-phase">Phase</span>
                                            <span class="timeline-summary" x-text="'→ ' + event.phase"></span>
                                            <span class="timeline-detail" x-show="event.intent" x-text="event.intent"></span>
                                        </span>
                                    </template>
                                    <template x-if="event.type === 'tool_start'">
                                        <span>
                                            <span class="timeline-badge badge-tool">Tool</span>
                                            <span class="timeline-summary" x-text="event.toolName"></span>
                                            <span class="timeline-detail" x-show="event.args && Object.keys(event.args).length > 0" x-text="JSON.stringify(event.args)"></span>
                                        </span>
                                    </template>
                                    <template x-if="event.type === 'tool_complete'">
                                        <span>
                                            <span :class="'timeline-badge ' + (event.success ? 'badge-success' : 'badge-error')" x-text="event.success ? '✓' : '✗'"></span>
                                            <span class="timeline-summary" x-text="event.toolCallId"></span>
                                        </span>
                                    </template>
                                    <template x-if="event.type === 'assistant_message'">
                                        <span>
                                            <span class="timeline-badge badge-msg">Msg</span>
                                            <span class="timeline-summary" x-text="event.content.length > 80 ? event.content.slice(0, 80) + '…' : event.content"></span>
                                        </span>
                                    </template>
                                </div>
                            </template>
                        </div>

                        <!-- Report section -->
                        <template x-if="detailAgent.reportText">
                            <div class="detail-report">
                                <div class="report-heading">Report</div>
                                <div class="report-body" x-text="detailAgent.reportText"></div>
                            </div>
                        </template>
                    </div>
                </template>
                <template x-if="!detailAgent">
                    <div class="detail-loading">Loading…</div>
                </template>
            </div>
        </aside>
    </div>

    <footer class="status-bar" role="status" aria-live="polite">
        <span :class="'ws-status ' + (wsConnected ? '' : 'disconnected')">
            WS: <span x-text="wsConnected ? 'Connected' : 'Disconnected'"></span>
        </span>
        <span>Updates: <span x-text="updateCount"></span></span>
        <span>Last: <span x-text="lastEvent"></span></span>
    </footer>
</main>
{% endblock %}

{% block scripts %}
<script>
function pipelinePage(initialState) {
    return {
        state: initialState,
        wsConnected: false,
        updateCount: 0,
        lastEvent: "none",
        ws: null,
        selectedQueryId: null,
        detailAgent: null,
        queryEvents: {},

        get detailEvents() {
            if (!this.selectedQueryId) return [];
            return this.queryEvents[this.selectedQueryId] || [];
        },

        init() {
            this.connectWebSocket();
        },

        connectWebSocket() {
            const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            this.ws = new WebSocket(`${protocol}//${window.location.host}/ws/pipeline`);
            this.ws.onopen = () => {
                this.wsConnected = true;
                this.lastEvent = "connected";
            };
            this.ws.onclose = () => {
                this.wsConnected = false;
                this.lastEvent = "disconnected";
                window.setTimeout(() => this.connectWebSocket(), 2000);
            };
            this.ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                this.updateCount += 1;
                this.lastEvent = data.phase
                    ? `${data.queryId} -> ${data.phase}`
                    : (data.type || "message");

                // Collect timeline events per query
                const timelineTypes = ["tool_start", "tool_complete", "assistant_message", "phase_change"];
                if (data.queryId && timelineTypes.includes(data.type)) {
                    if (!this.queryEvents[data.queryId]) {
                        this.queryEvents[data.queryId] = [];
                    }
                    this.queryEvents[data.queryId].push(data);

                    // Update live detail panel if open for this query
                    if (this.selectedQueryId === data.queryId && this.detailAgent) {
                        if (data.type === "phase_change") {
                            this.detailAgent.phase = data.phase;
                            this.detailAgent.intent = data.intent || this.detailAgent.intent;
                        } else if (data.type === "assistant_message") {
                            this.detailAgent.reportText = this.detailAgent.reportText
                                ? this.detailAgent.reportText + "\n" + data.content
                                : data.content;
                        }
                    }
                }

                this.refreshPipeline();
            };
        },

        refreshPipeline() {
            document.body.dispatchEvent(new CustomEvent("pipeline-reconcile"));
        },

        handlePipelineClick(event) {
            const card = event.target.closest("[data-query-id]");
            if (card) {
                this.openDetail(card.dataset.queryId);
            }
        },

        handlePipelineKeydown(event) {
            const card = event.target.closest("[data-query-id]");
            if (card) {
                this.openDetail(card.dataset.queryId);
            }
        },

        async openDetail(queryId) {
            this.selectedQueryId = queryId;
            this.detailAgent = null;
            try {
                const response = await fetch(`/api/agent/${queryId}`);
                if (!response.ok) {
                    this.detailAgent = { queryId, queryText: "", phase: "Unknown", intent: "", reportText: "", events: [] };
                    return;
                }
                const data = await response.json();
                this.detailAgent = data;
                // Server history is authoritative; subsequent WebSocket events will be appended
                this.queryEvents[queryId] = data.events || [];
            } catch (_) {
                this.detailAgent = { queryId, queryText: "", phase: "Unknown", intent: "", reportText: "", events: [] };
            }
        },

        closeDetail() {
            this.selectedQueryId = null;
            this.detailAgent = null;
        },

        async submitQuery() {
            const response = await fetch("/api/submit-query", { method: "POST" });
            if (!response.ok) {
                this.lastEvent = `submit failed (${response.status})`;
                return;
            }
            const data = await response.json();
            this.state = data.state;
            this.updateCount += 1;
            this.lastEvent = `${data.queryId} -> ${data.phase}`;
            this.refreshPipeline();
        },
    };
}
</script>
{% endblock %}
