<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/templates/layout.xhtml">
    <ui:define name="content">

        <div class="pipeline-shell">

            <!-- ============================================================
                 Header
                 ============================================================ -->
            <div class="pipeline-header">
                <h1>Real Estate Agent Pipeline</h1>

                <!-- "+" button: opens the add-enquiry dialog -->
                <h:form id="addForm" prependId="false">
                    <p:commandButton id="btnAdd"
                                     styleClass="btn-add"
                                     value="+"
                                     type="button"
                                     onclick="PF('dlgAddEnquiry').show()"
                                     title="Submit new enquiry" />
                </h:form>
            </div>

            <!-- ============================================================
                 Pipeline grid (wrapped in p:outputPanel so remoteCommand can update it)
                 ============================================================ -->
            <h:form id="pipelineForm" prependId="false">

                <!-- WebSocket: receives server push notifications -->
                <f:websocket channel="pipelineChannel"
                             scope="session"
                             user="#{appState.sessionId}"
                             onmessage="handlePipelinePush" />

                <!-- remoteCommand: called by JS to re-render the grid via JSF ajax -->
                <p:remoteCommand name="refreshPipeline"
                                 update=":pipelineGrid" />

                <p:outputPanel id="pipelineGrid" layout="block">
                    <div class="pipeline-grid">

                        <!-- QUEUED -->
                        <div class="phase-column phase-queued">
                            <div class="phase-header">Queued</div>
                            <div class="phase-body">
                                <ui:repeat value="#{appState.getAgentsByPhase('QUEUED')}" var="agent">
                                    <div id="agent-#{agent.id}" class="agent-card in-progress">
                                        <span class="status-dot queued"></span>
                                        <span class="agent-id">#{agent.id}</span>
                                        <h:panelGroup layout="block" styleClass="agent-enquiry" title="#{agent.enquiryText}"><h:outputText value="#{agent.enquiryText}" /></h:panelGroup>
                                        <h:panelGroup layout="block" styleClass="agent-intent"><h:outputText value="#{agent.currentIntent}" /></h:panelGroup>
                                    </div>
                                </ui:repeat>
                                <ui:fragment rendered="#{empty appState.getAgentsByPhase('QUEUED')}">
                                    <div class="phase-empty">—</div>
                                </ui:fragment>
                            </div>
                        </div>

                        <!-- VALIDATING -->
                        <div class="phase-column phase-validating">
                            <div class="phase-header">Validating</div>
                            <div class="phase-body">
                                <ui:repeat value="#{appState.getAgentsByPhase('VALIDATING')}" var="agent">
                                    <div id="agent-#{agent.id}" class="agent-card in-progress">
                                        <span class="status-dot"></span>
                                        <span class="agent-id">#{agent.id}</span>
                                        <h:panelGroup layout="block" styleClass="agent-enquiry" title="#{agent.enquiryText}"><h:outputText value="#{agent.enquiryText}" /></h:panelGroup>
                                        <h:panelGroup layout="block" styleClass="agent-intent"><h:outputText value="#{agent.currentIntent}" /></h:panelGroup>
                                    </div>
                                </ui:repeat>
                                <ui:fragment rendered="#{empty appState.getAgentsByPhase('VALIDATING')}">
                                    <div class="phase-empty">—</div>
                                </ui:fragment>
                            </div>
                        </div>

                        <!-- SEARCHING -->
                        <div class="phase-column phase-searching">
                            <div class="phase-header">Searching</div>
                            <div class="phase-body">
                                <ui:repeat value="#{appState.getAgentsByPhase('SEARCHING')}" var="agent">
                                    <div id="agent-#{agent.id}" class="agent-card in-progress">
                                        <span class="status-dot"></span>
                                        <span class="agent-id">#{agent.id}</span>
                                        <h:panelGroup layout="block" styleClass="agent-enquiry" title="#{agent.enquiryText}"><h:outputText value="#{agent.enquiryText}" /></h:panelGroup>
                                        <h:panelGroup layout="block" styleClass="agent-intent"><h:outputText value="#{agent.currentIntent}" /></h:panelGroup>
                                    </div>
                                </ui:repeat>
                                <ui:fragment rendered="#{empty appState.getAgentsByPhase('SEARCHING')}">
                                    <div class="phase-empty">—</div>
                                </ui:fragment>
                            </div>
                        </div>

                        <!-- WRITING_REPORT -->
                        <div class="phase-column phase-writing-report">
                            <div class="phase-header">Writing Report</div>
                            <div class="phase-body">
                                <ui:repeat value="#{appState.getAgentsByPhase('WRITING_REPORT')}" var="agent">
                                    <div id="agent-#{agent.id}" class="agent-card in-progress">
                                        <span class="status-dot"></span>
                                        <span class="agent-id">#{agent.id}</span>
                                        <h:panelGroup layout="block" styleClass="agent-enquiry" title="#{agent.enquiryText}"><h:outputText value="#{agent.enquiryText}" /></h:panelGroup>
                                        <h:panelGroup layout="block" styleClass="agent-intent"><h:outputText value="#{agent.currentIntent}" /></h:panelGroup>
                                    </div>
                                </ui:repeat>
                                <ui:fragment rendered="#{empty appState.getAgentsByPhase('WRITING_REPORT')}">
                                    <div class="phase-empty">—</div>
                                </ui:fragment>
                            </div>
                        </div>

                        <!-- DONE -->
                        <div class="phase-column phase-done">
                            <div class="phase-header">Done</div>
                            <div class="phase-body">
                                <ui:repeat value="#{appState.getAgentsByPhase('DONE')}" var="agent">
                                    <div id="agent-#{agent.id}" class="agent-card phase-done">
                                        <span class="status-dot done"></span>
                                        <span class="agent-id">#{agent.id}</span>
                                        <h:panelGroup layout="block" styleClass="agent-enquiry" title="#{agent.enquiryText}"><h:outputText value="#{agent.enquiryText}" /></h:panelGroup>
                                        <h:panelGroup layout="block" styleClass="agent-intent"><h:outputText value="#{agent.currentIntent}" /></h:panelGroup>
                                    </div>
                                </ui:repeat>
                                <ui:fragment rendered="#{empty appState.getAgentsByPhase('DONE')}">
                                    <div class="phase-empty">—</div>
                                </ui:fragment>
                            </div>
                        </div>

                        <!-- REJECTED -->
                        <div class="phase-column phase-rejected">
                            <div class="phase-header">Rejected</div>
                            <div class="phase-body">
                                <ui:repeat value="#{appState.getAgentsByPhase('REJECTED')}" var="agent">
                                    <div id="agent-#{agent.id}" class="agent-card phase-rejected">
                                        <span class="status-dot rejected"></span>
                                        <span class="agent-id">#{agent.id}</span>
                                        <h:panelGroup layout="block" styleClass="agent-enquiry" title="#{agent.enquiryText}"><h:outputText value="#{agent.enquiryText}" /></h:panelGroup>
                                        <h:panelGroup layout="block" styleClass="agent-intent"><h:outputText value="#{agent.currentIntent}" /></h:panelGroup>
                                    </div>
                                </ui:repeat>
                                <ui:fragment rendered="#{empty appState.getAgentsByPhase('REJECTED')}">
                                    <div class="phase-empty">—</div>
                                </ui:fragment>
                            </div>
                        </div>

                    </div><!-- /.pipeline-grid -->
                </p:outputPanel>

            </h:form>
        </div><!-- /.pipeline-shell -->

        <!-- ============================================================
             Add-enquiry dialog
             ============================================================ -->
        <p:dialog id="dlgAddEnquiry"
                  widgetVar="dlgAddEnquiry"
                  header="Submit New Enquiry"
                  modal="true"
                  resizable="false"
                  width="520"
                  styleClass="enquiry-dialog">
            <h:form id="enquiryForm" prependId="false">
                <div class="enquiry-form">
                    <h:inputTextarea id="enquiryText"
                                     value="#{appState.enquiryDraft}"
                                     rows="4"
                                     required="true"
                                     label="Enquiry"
                                     styleClass="enquiry-textarea">
                        <f:validateRegex pattern=".*\S.*"
                                         message="Enquiry must contain at least one non-whitespace character." />
                    </h:inputTextarea>

                    <p:commandButton value="Submit"
                                     action="#{appState.submitDraftEnquiry}"
                                     update=":pipelineGrid @form"
                                     oncomplete="if(!args.validationFailed) PF('dlgAddEnquiry').hide()"
                                     styleClass="ui-button" />

                    <div class="sample-enquiries-label">Or choose a sample enquiry:</div>
                    <div class="sample-list">

                        <p:commandButton value="Looking for a 3-bed family home near good schools in the suburbs, budget around $500k"
                                         styleClass="sample-btn"
                                         action="#{appState.submitEnquiry('Looking for a 3-bed family home near good schools in the suburbs, budget around $500k')}"
                                         update=":pipelineGrid @form"
                                         oncomplete="PF('dlgAddEnquiry').hide()" />

                        <p:commandButton value="Need a downtown condo with parking, 1-2 bedrooms, under $350k"
                                         styleClass="sample-btn"
                                         action="#{appState.submitEnquiry('Need a downtown condo with parking, 1-2 bedrooms, under $350k')}"
                                         update=":pipelineGrid @form"
                                         oncomplete="PF('dlgAddEnquiry').hide()" />

                        <p:commandButton value="Seeking waterfront property with at least 4 bedrooms for retirement"
                                         styleClass="sample-btn"
                                         action="#{appState.submitEnquiry('Seeking waterfront property with at least 4 bedrooms for retirement')}"
                                         update=":pipelineGrid @form"
                                         oncomplete="PF('dlgAddEnquiry').hide()" />

                        <p:commandButton value="Want a rural property with land, at least 5 acres, horse-friendly"
                                         styleClass="sample-btn"
                                         action="#{appState.submitEnquiry('Want a rural property with land, at least 5 acres, horse-friendly')}"
                                         update=":pipelineGrid @form"
                                         oncomplete="PF('dlgAddEnquiry').hide()" />

                        <p:commandButton value="asdkjh asdkjhasd this is spam garbage text!!!"
                                         styleClass="sample-btn"
                                         action="#{appState.submitEnquiry('asdkjh asdkjhasd this is spam garbage text!!!')}"
                                         update=":pipelineGrid @form"
                                         oncomplete="PF('dlgAddEnquiry').hide()" />

                        <p:commandButton value="Looking for an affordable studio apartment near a university campus"
                                         styleClass="sample-btn"
                                         action="#{appState.submitEnquiry('Looking for an affordable studio apartment near a university campus')}"
                                         update=":pipelineGrid @form"
                                         oncomplete="PF('dlgAddEnquiry').hide()" />

                        <p:commandButton value="Need a 4-bedroom house with a large garden, pet-friendly neighbourhood, under $750k"
                                         styleClass="sample-btn"
                                         action="#{appState.submitEnquiry('Need a 4-bedroom house with a large garden, pet-friendly neighbourhood, under $750k')}"
                                         update=":pipelineGrid @form"
                                         oncomplete="PF('dlgAddEnquiry').hide()" />

                        <p:commandButton value="BUY CRYPTO NOW!!! Not actually looking for property lol"
                                         styleClass="sample-btn"
                                         action="#{appState.submitEnquiry('BUY CRYPTO NOW!!! Not actually looking for property lol')}"
                                         update=":pipelineGrid @form"
                                         oncomplete="PF('dlgAddEnquiry').hide()" />

                        <p:commandButton value="Investor looking for multi-unit rental property near a major hospital"
                                         styleClass="sample-btn"
                                         action="#{appState.submitEnquiry('Investor looking for multi-unit rental property near a major hospital')}"
                                         update=":pipelineGrid @form"
                                         oncomplete="PF('dlgAddEnquiry').hide()" />

                    </div>
                </div>
            </h:form>
        </p:dialog>

    </ui:define>
</ui:composition>
