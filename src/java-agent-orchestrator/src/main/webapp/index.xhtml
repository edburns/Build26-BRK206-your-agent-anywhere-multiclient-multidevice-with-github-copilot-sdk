<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <title>Java Agent Orchestrator</title>
</h:head>
<h:body>
    <h1>Java Agent Orchestrator</h1>
    <p>Active agents: #{appState.agents.size()}</p>

    <h:form>
        <h:commandButton value="Submit sample enquiry" action="#{appState.submitSampleEnquiry}">
            <f:ajax execute="@form" render="@none" />
        </h:commandButton>
    </h:form>

    <f:websocket channel="pipelineChannel" scope="session" user="#{session.id}" onmessage="handlePipelinePush" />

    <script>
        function handlePipelinePush(message) {
            console.log('Pipeline update received:', message);
        }
    </script>
</h:body>
</html>
